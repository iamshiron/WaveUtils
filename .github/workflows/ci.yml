name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The @shiron/ui component library is a git submodule.
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @shiron/wave-utils-web exec biome lint src

      - name: Build
        run: pnpm --filter @shiron/wave-utils-web build

      - name: Test
        run: pnpm --filter @shiron/wave-utils-web test
